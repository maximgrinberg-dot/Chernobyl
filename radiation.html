// Physical constants
const ln2 = Math.log(2);

// Half-lives in years
const half_lives = {
    "U-238": 4.468e9,
    "Pu-239": 24110,
    "Cs-137": 30.07
};

// Decay energies in MeV
const decay_energy = {
    "U-238": 4.27,
    "Pu-239": 5.25,
    "Cs-137": 1.176
};

// Simulation parameters
const N0 = 1000000;
const time_step = 1;          // year
const simulation_years = 200;
const E_critical = 5.9e29;       // meltdown threshold (MeV)
let trials = 5000;

// Function to generate binomial random number
function binomial(n, p) {
    const log_q = Math.log(1-p)
    let x = 0;
    let sum = 0
    while (true) {
        sum += Math.log(Math.random()) / (n-x)
        if (sum < log_q) {
            return x
        }
        x++;
    }
}

function monte_carlo_meltdown(isotope) {
    const lambda_decay = ln2 / half_lives[isotope];
    const decay_eng = decay_energy[isotope]
    let meltdown_count = 0;
    let energies = []

    // Per-step decay probability
    const P = 1 - Math.exp(-lambda_decay * time_step);

    for (let t = 0; t < trials; t++) {
        let N = N0;
        let total_energy = 0.0;

        for (let year = 0; year < simulation_years; year++) {
            if (N <= 0) break;

            const decays = binomial(N, P);
            total_energy += decays * decay_eng;
            N -= decays;

            if (total_energy >= E_critical) {
              meltdown_count++;
              for (let i=0; i<36; i++) {
                if (isotope === 'U-238') {
                  if (total_energy < (i+1)/4) {
                    energies.push(i)
                    break;
                  }
                }
                else if (isotope === 'Pu-239') {
                  if (total_energy < (550/9)*(i+1)+29000) {
                    energies.push(i)
                    break;
                  }
                } else if (isotope === 'Cs-137') {
                  if (total_energy < (50/3)*(i+1)+1164000) {
                    energies.push(i)
                    break;
                  }
                } 
              }
            }
        }
        for (let i=0; i<36; i++) {
          if (isotope === 'U-238') {
            if (total_energy < (i+1)/4) {
              energies.push(i)
              break;
            }
          } else if (isotope === 'Pu-239') {
            if (total_energy < (550/9)*(i+1)+29000) {
              energies.push(i)
              break;
            }
          } else if (isotope === 'Cs-137') {
            if (total_energy < (50/3)*(i+1)+1164000) {
              energies.push(i)
              break;
            }
          }
        }
    }
    return energies
}

  }

// Run simulation for each isotope
function radiationSim() {
  for (const isotope of ['U-238', 'Pu-239','Cs-137']) {
  if (isotope === 'U-238') {

    trials = 500
    chart = cCs137

resetList(chart)
a = monte_carlo_meltdown(isotope);
updateList(a, chart);
}
